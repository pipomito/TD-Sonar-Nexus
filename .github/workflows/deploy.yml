name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: temurin
        cache: maven


    - name: Maven build
      run: |
        mvn clean verify


    - name: SonarQube analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        mvn sonar:sonar \
        -Dsonar.projectKey=TD-Sonar-Nexus \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.token=$SONAR_TOKEN


    - name: Docker login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    - name: Docker build
      run: |
        docker build \
        -t ${{ secrets.DOCKER_USERNAME }}/td-sonar-nexus:latest .


    - name: Docker push
      run: |
        docker push \
        ${{ secrets.DOCKER_USERNAME }}/td-sonar-nexus:latest
